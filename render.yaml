services:
  - type: web
    name: urbangreen-backend
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/urbangreen.db
    disk:
      name: urbangreen-data
      mountPath: /var/data
      sizeGB: 1
